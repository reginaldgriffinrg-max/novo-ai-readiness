/* ─── ENGAGEMENT CODE SYSTEM ───
   Format: NOVO-[TIER]-[DISTRICTCODE]-[YYYYMMDD]
   TIER: T1=Strategy Session  T2=Governance Sprint  T3=Full District Engagement
   YYYYMMDD: expiration date — valid through end of that day
   Examples: NOVO-T1-MCSD-20261231 / NOVO-T2-BIBB-20260630 / NOVO-T3-DCSD-20261231
   Demo codes (never expire): NOVO-T1-DEMO-99991231 / NOVO-T2-DEMO-99991231 / NOVO-T3-DEMO-99991231

   Server validation (optional, hard enforcement):
   Deploy api/validate-code.js to Vercel, then set VALIDATOR_URL below.
   While null, the app uses client-side validation only.
─── */
const VALIDATOR_URL = null; // "https://novo-validate-code.vercel.app/api/validate-code"

const parseCode = (code) => {
  if (!code) return null;
  const clean = code.trim().toUpperCase();
  const match = clean.match(/^NOVO-(T[123])-([A-Z0-9]+)-(\d{8})$/);
  if (!match) return null;
  const dateStr = match[3];
  const expDate = new Date(
    parseInt(dateStr.slice(0,4)),
    parseInt(dateStr.slice(4,6)) - 1,
    parseInt(dateStr.slice(6,8)),
    23, 59, 59
  );
  const isDemo    = match[2] === "DEMO";
  const isExpired = isDemo ? false : new Date() > expDate;
  const daysLeft  = isDemo ? null : Math.ceil((expDate - new Date()) / 86400000);
  return { tier: match[1], district: match[2], expDate, daysLeft, isExpired, isDemo, raw: clean };
};
const tierLevel = (code) => {
  if (!code) return 0;
  const p = parseCode(code);
  if (!p || p.isExpired) return 0;
  return parseInt(p.tier[1]);
};

/* ─── JSON EXTRACTOR (robust) ─── */
const extractJSON = (text) => {
  if (!text || !text.trim()) throw new Error("Empty response");
  // Strip markdown fences if present
  const fence = text.match(/```(?:json)?\s*([\s\S]*?)```/);
  if (fence) return JSON.parse(fence[1].trim());
  // Find first balanced { } block
  let d = 0, s = -1;
  for (let i = 0; i < text.length; i++) {
    if (text[i] === "{") { if (s === -1) s = i; d++; }
    else if (text[i] === "}") {
      if (--d === 0 && s !== -1) {
        const candidate = text.slice(s, i + 1);
        const parsed = JSON.parse(candidate);
        // Reject if this is an API error object, not our data
        if (parsed.error && !parsed.districtName && !parsed.planTitle && !Array.isArray(parsed)) {
          throw new Error(parsed.error.message || "API returned an error");
        }
        return parsed;
      }
    }
  }
  // Fall back to first balanced [ ] block (for FAQ)
  d = 0; s = -1;
  for (let i = 0; i < text.length; i++) {
    if (text[i] === "[") { if (s === -1) s = i; d++; }
    else if (text[i] === "]") { if (--d === 0 && s !== -1) return JSON.parse(text.slice(s, i + 1)); }
  }
  throw new Error("No JSON found in response");
};

/* ─── SCAN CACHE ─── */
const SCAN_CACHE_KEY = "novo_scan_cache";
const SCAN_CACHE_TTL = 7 * 24 * 60 * 60 * 1000; // 7 days

const getCachedScan = (url) => {
  try {
    const raw = sessionStorage.getItem(SCAN_CACHE_KEY);
    if (!raw) return null;
    const cache = JSON.parse(raw);
    const key = url.toLowerCase().replace(/\/+$/, "");
    const entry = cache[key];
    if (!entry) return null;
    if (Date.now() - entry.ts > SCAN_CACHE_TTL) { delete cache[key]; sessionStorage.setItem(SCAN_CACHE_KEY, JSON.stringify(cache)); return null; }
    return entry.data;
  } catch (_) { return null; }
};

const setCachedScan = (url, data) => {
  try {
    const raw = sessionStorage.getItem(SCAN_CACHE_KEY);
    const cache = raw ? JSON.parse(raw) : {};
    const key = url.toLowerCase().replace(/\/+$/, "");
    cache[key] = { data, ts: Date.now() };
    sessionStorage.setItem(SCAN_CACHE_KEY, JSON.stringify(cache));
  } catch (_) { /* storage full or unavailable */ }
};

const MODEL_SONNET = "claude-sonnet-4-20250514";
const MODEL_HAIKU  = "claude-haiku-4-5-20251001";

const callClaude = async ({ prompt, maxTokens = 4096, useWebSearch = false, signal, model }) => {
  const body = {
    model: model || MODEL_SONNET,
    max_tokens: maxTokens,
    messages: [{ role: "user", content: prompt }],
  };
  if (useWebSearch) body.tools = [{ type: "web_search_20250305", name: "web_search" }];

  const headers = { "Content-Type": "application/json", "anthropic-version": "2023-06-01" };


  const res = await fetch("https://broad-lake-b851.reginaldgriffin-rg.workers.dev/", {
    method: "POST",
    headers,
    ...(signal ? { signal } : {}),
    body: JSON.stringify(body),
  });

  const data = await res.json();

  // Detect API-level errors before trying to parse content
  if (!res.ok || data.error) {
    const msg = data.error?.message || `API error ${res.status}`;
    // Provide friendly messages for common error codes
    if (res.status === 401) throw new Error("Authentication error. Please contact Novo Innovative Pathways.");
    if (res.status === 429) throw new Error("Rate limit reached. Please wait 60 seconds and try again.");
    if (res.status === 529) throw new Error("The AI service is temporarily overloaded. Please try again in a moment.");
    throw new Error(msg);
  }

  const text = (data.content || []).filter(b => b.type === "text").map(b => b.text).join("\n");
  return text;
};

/* ─── RADAR CHART ─── */
function RadarChart({ domainData }) {
  const size = 200, cx = 100, cy = 100, maxR = 76, n = ALL_DOMAINS.length;
  const pt = (i, score) => {
    const a = (i / n) * 2 * Math.PI - Math.PI / 2;
    const r = (score / 4) * maxR;
    return [cx + r * Math.cos(a), cy + r * Math.sin(a)];
  };
  const catColor = (id) => (DOMAIN_CATS.find(c => c.domains.some(d => d.id === id)) || {}).accent || "#3b82f6";
  const scores = ALL_DOMAINS.map(d => domainData?.[d.id]?.score ?? 0);
  const rings = [1, 2, 3, 4].map(l =>
    ALL_DOMAINS.map((_, i) => { const [x, y] = pt(i, l); return `${i === 0 ? "M" : "L"}${x},${y}`; }).join(" ") + "Z"
  );
  const shapePath = scores.map((s, i) => { const [x, y] = pt(i, s); return `${i === 0 ? "M" : "L"}${x},${y}`; }).join(" ") + "Z";

  return (
    <svg width={size} height={size} style={{ overflow: "visible" }}>
      {rings.map((d, i) => <path key={i} d={d} fill="none" stroke="#1e2d4a" strokeWidth={i === 3 ? 1 : 0.5} />)}
      {ALL_DOMAINS.map((_, i) => {
        const [x, y] = pt(i, 4);
        return <line key={i} x1={cx} y1={cy} x2={x} y2={y} stroke="#1e2d4a" strokeWidth={0.5} />;
      })}
      <path d={shapePath} fill="#3b82f618" stroke="#3b82f6" strokeWidth={1.5} />
      {scores.map((s, i) => {
        const [x, y] = pt(i, s);
        return <circle key={i} cx={x} cy={y} r={3} fill={catColor(ALL_DOMAINS[i].id)} />;
      })}
      {ALL_DOMAINS.map((d, i) => {
        const [x, y] = pt(i, 5);
        return <text key={i} x={x} y={y} textAnchor="middle" dominantBaseline="middle" fontSize={7.5} fill="#475569" fontFamily="Outfit,sans-serif">{d.short}</text>;
      })}
    </svg>
  );
}

const recommendTier = (domainData) => {
  if (!domainData) return null;
  const scores = ALL_DOMAINS.map(d => domainData[d.id]?.score ?? 0);
  const avg = Math.round(scores.reduce((a, b) => a + b, 0) / scores.length * 10) / 10;
  const govAvg = Math.round(["policy","privacy","infra"].map(id => domainData[id]?.score ?? 0).reduce((a,b) => a+b, 0) / 3 * 10) / 10;
  const zeros = scores.filter(s => s === 0).length;
  if (avg < 1.0 || zeros >= 7) return {
    tier:"T1", headline:"Your findings point toward a Strategy Session.",
    rationale:`With ${zeros} of 10 domains showing no public documentation and an overall score of ${avg}, the priority is establishing a clear baseline and governance roadmap before any implementation begins. A Strategy Session gives your leadership team the findings and prioritized recommendations needed to move forward confidently.`,
    urgency:"Foundational gaps across multiple domains represent governance exposure that grows with every month AI use continues without oversight.",
  };

    tier:"T2", headline:"Your findings point toward a Governance Sprint.",
    rationale:`Your district shows early evidence of technology governance — but AI-specific policy, frameworks, and leadership capacity are not yet in place. With an overall score of ${avg} and governance averaging ${govAvg}, the Governance Sprint is the right vehicle: six to eight weeks to build the policy infrastructure, leadership capacity, and implementation roadmap your district needs.`,
    urgency:"Districts at this stage are typically managing AI use reactively. A Governance Sprint converts that into a defensible, board-ready posture.",
  };
  return {
    tier:"T3", headline:"Your findings suggest readiness for a Full District Engagement.",
    rationale:`Your district has a partial governance foundation in place — scoring ${avg} overall. The opportunity now is to build on that foundation systematically: moving from isolated practices to district-wide AI literacy, applied instructional AI, and operational integration. A Full District Engagement is designed for exactly this stage.`,
    urgency:"Districts with emerging foundations that don't formalize them often see those foundations erode as AI adoption accelerates faster than governance can follow.",
  };
};

/* ─── SCHOOL SECTIONS ─── */

  { id:"practice", label:"Building-Level AI Practice",
    guidance:"These questions surface the actual scope of AI use in your building — the starting point for responsible oversight.",
    questions:[

  },
  { id:"governance", label:"Building-Level Governance",
    guidance:"These questions identify whether oversight structures exist at the building level — separate from district-level policy.",
    questions:[
      { id:"oversight", label:"Principal Oversight",     q:"Do you have a process for teachers to report AI tool usage? Have you addressed any AI-related incidents this year?", opts:["No process","Informal only","Partial process","Structured process","Fully documented"] },
      { id:"capacity",  label:"Building-Level Capacity", q:"Have your teachers received school-specific AI professional development beyond general district PD events?", opts:["None","District PD only","1 building event","Multiple events","Ongoing program"] },

      { id:"grading",    label:"AI in Grading",     q:"Are any teachers using AI tools to evaluate or grade student work without explicit district guidance?", opts:["Definitely not","Likely not","Possibly","Probably yes","Definitely yes"] },
      { id:"unreported", label:"Unreported AI Use",  q:"Do you believe AI is being used in your building in ways that district leadership does not currently know about?", opts:["Definitely not","Likely not","Possibly","Probably yes","Definitely yes"] },

const SCHOOL_GUIDANCE = {
  awareness: { lo:"Low staff awareness is the baseline — a formal AI tool census is urgently needed before governance work can be scoped accurately.", hi:"High awareness is a prerequisite for responsible oversight — now pair it with a formal inventory and approval process." },
  tools:     { lo:"An unknown tool landscape is an unmanaged risk. A building-level AI tool census should happen before the semester ends.", hi:"Knowing what's in use is the foundation. The next step is classifying each tool as district-approved, under review, or prohibited." },
  classroom: { lo:"Low AI classroom activity may reflect early adoption — or lack of visibility. Neither should be assumed without data.", hi:"High classroom AI activity without guidelines is the most common and most correctable governance gap in K-12. It requires a policy response, not just a PD response." },

const SCAN_MSGS = [
  "Searching for AI governance artifacts…",
  "Evaluating Evidence Spine layers…",
  "Scoring 10 readiness domains…",
  "Generating findings and service recommendations…",
];

/* ══════════════════════════════════════════════════════════
   MAIN APP
══════════════════════════════════════════════════════════ */
function NovoApp() {
  const [step, setStep]             = useState("landing");
  const [fadeIn, setFadeIn]         = useState(true);
  const [codeInput, setCodeInput]   = useState("");
  const [codeError, setCodeError]   = useState("");
  const [codeValidating, setCodeValidating] = useState(false);
  const [engagementCode, setEngagementCode] = useState(null);
  const [apiKey, setApiKey]         = useState(() => sessionStorage.getItem("novo_api_key") || "");
  const [showApiField, setShowApiField] = useState(false);
  const [serverToken, setServerToken] = useState(null);
  const [districtURL, setDistrictURL] = useState("");
  const [scanning, setScanning]     = useState(false);
  const [scanStep, setScanStep]     = useState(0);
  const [scanError, setScanError]   = useState(null);
  const [districtData, setDistrictData] = useState(null);
  const [scanTimestamp, setScanTimestamp] = useState(null);
  const [resultsTab, setResultsTab] = useState("recommendation");
  const [activeDomain, setActiveDomain] = useState(null);
  const [showLegend, setShowLegend] = useState(false);
  const [strategicData, setStrategicData] = useState(null);
  const [strategicScanning, setStrategicScanning] = useState(false);
  const [strategicError, setStrategicError] = useState(null);
  const [planText, setPlanText]     = useState("");
  const [showPlanPaste, setShowPlanPaste] = useState(false);
  const [activeGoal, setActiveGoal] = useState(0);
  const [faqData, setFaqData]       = useState(null);
  const [faqLoading, setFaqLoading] = useState(false);
  const [faqError, setFaqError]     = useState(null);
  const [schoolAnswers, setSchoolAnswers] = useState({});
  const [schoolName, setSchoolName] = useState("");
  const [principalName, setPrincipalName] = useState("");
  const [schoolResults, setSchoolResults] = useState(null);
  const abortRef = useRef(null);
  const timerRef = useRef(null);
  const strategicAbortRef = useRef(null);

  const tr  = (fn) => { setFadeIn(false); setTimeout(() => { fn(); setFadeIn(true); }, 160); };
  const go  = (s)  => tr(() => setStep(s));
  const tl  = tierLevel(engagementCode);

  /* ── SCORE HELPERS ── */
  const catScore = useCallback((cat) => {
    if (!districtData?.domains) return 0;
    const s = cat.domains.map(d => districtData.domains[d.id]?.score ?? 0);
    return Math.round(s.reduce((a, b) => a + b, 0) / s.length * 10) / 10;
  }, [districtData]);

  const overallScore = useCallback(() => {
    if (!districtData?.domains) return 0;
    const all = ALL_DOMAINS.map(d => districtData.domains[d.id]?.score ?? 0);
    return Math.round(all.reduce((a, b) => a + b, 0) / all.length * 10) / 10;
  }, [districtData]);

  /* ── CODE GATE ── */
  const submitCode = async () => {
    const raw = codeInput.trim().toUpperCase();
    const parsed = parseCode(raw);
    if (!parsed) {
      setCodeError("Invalid code format. Your code should look like NOVO-T2-DISTRICTCODE-20261231. Contact Novo Innovative Pathways if you need yours.");
      return;
    }
    if (parsed.isExpired) {
      const exp = parsed.expDate.toLocaleDateString("en-US", { month:"long", day:"numeric", year:"numeric" });
      setCodeError(`This engagement code expired on ${exp}. Contact Novo Innovative Pathways to renew your engagement.`);
      return;
    }
    if (VALIDATOR_URL) {
      setCodeValidating(true);
      setCodeError("");
      try {
        const res  = await fetch(VALIDATOR_URL, { method:"POST", headers:{"Content-Type":"application/json"}, body:JSON.stringify({ code: raw }) });
        const data = await res.json();
        if (!data.valid) { setCodeError(data.reason || "Code validation failed. Contact Novo Innovative Pathways."); setCodeValidating(false); return; }
        setServerToken(data.token);
      } catch (_) {
        setServerToken(null); // network error — fall back to client-side
      } finally { setCodeValidating(false); }
    }
    setEngagementCode(raw);
    setCodeError("");
    go("scan");
  };

  /* ── SCAN ── */
  const [usedCache, setUsedCache] = useState(false);

  const runScan = async (forceRefresh = false) => {
    if (!districtURL.trim()) return;

    // Abort any in-flight scan before starting a new one
    if (abortRef.current) { abortRef.current.abort(); abortRef.current = null; }
    if (timerRef.current) { clearInterval(timerRef.current); timerRef.current = null; }

    setScanError(null); setDistrictData(null); setStrategicData(null); setFaqData(null);
    setFaqError(null); setScanTimestamp(null); setUsedCache(false);
    setResultsTab("recommendation"); setActiveDomain(null);

    let url = districtURL.trim();
    if (!/^https?:\/\//i.test(url)) url = "https://" + url;

    // Check cache first (unless force refresh)
    if (!forceRefresh) {
      const cached = getCachedScan(url);
      if (cached) {
        cached._url = url;
        setDistrictData(cached);
        setScanTimestamp(new Date(cached._cachedAt || Date.now()));
        setUsedCache(true);
        go("results");
        return;
      }
    }

    setScanning(true); setScanStep(0);

    abortRef.current = new AbortController();
    const timeout = setTimeout(() => {
      if (abortRef.current) abortRef.current.abort();
    }, 90000);
    timerRef.current = setInterval(() => setScanStep(s => Math.min(s + 1, SCAN_MSGS.length - 1)), 9000);

    try {
      const text = await callClaude({
        prompt: buildScanPrompt(url),
        maxTokens: 4096,
        useWebSearch: true,
        signal: abortRef.current.signal,
      });

      const parsed = extractJSON(text);
      parsed._url = url;
      parsed._cachedAt = Date.now();
      setDistrictData(parsed);
      setScanTimestamp(new Date());
      setCachedScan(url, parsed);
      go("results");
    } catch (e) {
      if (e.name === "AbortError") {
        setScanError("Scan timed out after 90 seconds. Try again — some district sites take longer to search.");
      } else {
        setScanError(e.message || "Scan failed. Please check the URL and try again.");
      }
    } finally {
      clearTimeout(timeout);
      if (timerRef.current) { clearInterval(timerRef.current); timerRef.current = null; }
      abortRef.current = null;
      setScanning(false);
    }
  };

  /* ── STRATEGIC ── */
  const runStrategicScan = async () => {
    // Abort any prior strategic scan
    if (strategicAbortRef.current) { strategicAbortRef.current.abort(); strategicAbortRef.current = null; }

    setStrategicError(null); setStrategicData(null); setStrategicScanning(true); setActiveGoal(0);
    strategicAbortRef.current = new AbortController();
    const timeout = setTimeout(() => {
      if (strategicAbortRef.current) strategicAbortRef.current.abort();
    }, 90000);

    try {
      const hasPastedPlan = !!planText.trim();
      const text = await callClaude({
        prompt: buildStrategicPrompt(districtData.districtName, districtData._url, planText),
        maxTokens: 4096,
        useWebSearch: !hasPastedPlan,
        model: hasPastedPlan ? MODEL_HAIKU : MODEL_SONNET,
        signal: strategicAbortRef.current.signal,
      });
      setStrategicData(extractJSON(text));
    } catch (e) {
      if (e.name === "AbortError") {
        setStrategicError("Strategic plan analysis timed out. Try pasting the plan text directly for faster results.");
      } else {
        setStrategicError(e.message || "Strategic plan analysis failed. Try pasting the plan text directly.");
      }
    } finally {
      clearTimeout(timeout);
      strategicAbortRef.current = null;
      setStrategicScanning(false);
    }
  };

  /* ── FAQ ── */
  const runFAQ = async () => {
    setFaqLoading(true);
    setFaqError(null);
    try {
      const text = await callClaude({
        prompt: buildFAQPrompt(districtData.districtName, districtData.executiveSynthesis, districtData.criticalExposures),
        maxTokens: 2000,
        useWebSearch: false,
        model: MODEL_HAIKU,
      });
      const parsed = extractJSON(text);
      setFaqData(Array.isArray(parsed) ? parsed : []);
    } catch (e) {
      setFaqError(e.message || "FAQ generation failed. Please try again.");
      setFaqData(null);
    } finally {
      setFaqLoading(false);
    }
  };

  /* ── SCHOOL ── */
  const computeSchoolResults = () => {
    const allQ = SCHOOL_SECTIONS.flatMap(s => s.questions);
    const avg  = Math.round(allQ.reduce((a, q) => a + (schoolAnswers[q.id] ?? 0), 0) / allQ.length * 10) / 10;
    const riskQ = ["data","grading","unreported"];
    const riskScore = Math.round(riskQ.reduce((a, id) => a + (schoolAnswers[id] ?? 0), 0) / riskQ.length * 10) / 10;
    setSchoolResults({ avg, riskScore, answers: { ...schoolAnswers } });
    go("school_results");
  };

  /* ─────────────────────────────────────────────────
     RENDER HELPERS
  ───────────────────────────────────────────────── */

  /* ── RECOMMENDATION TAB ── */
  const renderRecommendationTab = () => {
    const rec = recommendTier(districtData?.domains);
    if (!rec) return null;
    const recTier = NOVO_TIERS.find(t => t.id === rec.tier) || NOVO_TIERS[0];
    const gapDomains = ALL_DOMAINS.filter(d => (districtData?.domains?.[d.id]?.score ?? 0) < 2);

    return (
      <div>
        <div style={{ background:"#0a1628", border:`1px solid ${recTier.border}`, borderLeft:`4px solid ${recTier.color}`, padding:"24px 28px", marginBottom:24 }}>
          <div style={{ fontFamily:F, fontSize:10, fontWeight:700, color:recTier.color, letterSpacing:"0.14em", textTransform:"uppercase", marginBottom:10 }}>Novo Service Recommendation</div>
          <div style={{ fontFamily:Fs, fontSize:20, color:"#e0e7ff", fontWeight:600, marginBottom:12 }}>{rec.headline}</div>
          <div style={{ fontFamily:F, fontSize:13, color:"#94a3b8", lineHeight:1.8, marginBottom:16 }}>{rec.rationale}</div>
          <div style={{ background:"#080d1a", border:`1px solid ${recTier.border}44`, padding:"12px 16px", fontFamily:F, fontSize:12, color:recTier.color, lineHeight:1.6 }}>
            {rec.urgency}
          </div>
        </div>

        <div style={{ fontFamily:F, fontSize:10, fontWeight:700, color:"#4b6a9e", letterSpacing:"0.14em", textTransform:"uppercase", marginBottom:14 }}>Engagement Pathways</div>
        <div style={{ display:"flex", flexDirection:"column", gap:12, marginBottom:28 }}>
          {NOVO_TIERS.map(t => {
            const isRec = t.id === rec.tier;
            return (
              <div key={t.id} style={{ background:isRec ? t.bg : "#080d1a", border:`1px solid ${isRec ? t.border : "#1e2d4a"}`, padding:"20px 24px", position:"relative", opacity:isRec ? 1 : 0.65 }}>
                {isRec && <div style={{ position:"absolute", top:0, right:0, fontFamily:F, fontSize:9, fontWeight:700, background:t.color, color:"#000", padding:"4px 12px", letterSpacing:"0.1em", textTransform:"uppercase" }}>RECOMMENDED</div>}
                <div style={{ display:"grid", gridTemplateColumns:"1fr auto", gap:20, alignItems:"start" }}>
                  <div>
                    <div style={{ fontFamily:F, fontSize:9, fontWeight:700, color:t.color, letterSpacing:"0.14em", textTransform:"uppercase", marginBottom:6 }}>{t.badge}</div>
                    <div style={{ fontFamily:Fs, fontSize:16, color:"#e0e7ff", fontWeight:600, marginBottom:4 }}>{t.label}</div>
                    <div style={{ fontFamily:F, fontSize:12, color:"#64748b", lineHeight:1.65, marginBottom:isRec ? 12 : 0 }}>{isRec ? t.desc : t.tagline}</div>
                    {isRec && <div style={{ fontFamily:F, fontSize:11, color:"#475569", lineHeight:1.7, borderLeft:`2px solid ${t.border}`, paddingLeft:10 }}>{t.novoDelivers}</div>}
                  </div>
                  {isRec && (
                    <a href={"https://novoinnovativepathways.com/#contact?utm_source=readiness_app&utm_medium=cta&utm_campaign=tier_" + t.id} target="_blank" rel="noopener noreferrer"
                      style={{ background:t.bg, color:t.color, border:`1px solid ${t.border}`, padding:"10px 20px", fontFamily:F, fontSize:11, fontWeight:700, letterSpacing:"0.08em", textTransform:"uppercase", cursor:"pointer", textDecoration:"none", whiteSpace:"nowrap", display:"inline-block" }}>
                      Get Started
                    </a>
                  )}
                </div>
              </div>
            );
          })}
        </div>

        <div style={{ fontFamily:F, fontSize:10, fontWeight:700, color:"#4b6a9e", letterSpacing:"0.14em", textTransform:"uppercase", marginBottom:14 }}>How Your Gaps Map to Novo Services</div>
        <div style={{ display:"flex", flexDirection:"column", gap:6 }}>
          {gapDomains.map(d => {
            const dom  = districtData?.domains?.[d.id] || {};
            const t    = tierOf(d.id);
            return (
              <div key={d.id} style={{ background:"#080d1a", border:"1px solid #1e2d4a", padding:"12px 16px", display:"grid", gridTemplateColumns:"auto 1fr auto", gap:14, alignItems:"center" }}>
                <div style={{ width:28, height:28, background:sc(dom.score ?? 0)+"22", border:`1px solid ${sc(dom.score ?? 0)}44`, display:"flex", alignItems:"center", justifyContent:"center", flexShrink:0 }}>
                  <span style={{ fontFamily:Fs, fontSize:14, fontWeight:600, color:sc(dom.score ?? 0) }}>{dom.score ?? 0}</span>
                </div>
                <div>
                  <div style={{ fontFamily:F, fontSize:12, fontWeight:600, color:"#cbd5e1", marginBottom:2 }}>{d.label}</div>
                  <div style={{ fontFamily:F, fontSize:11, color:"#475569", lineHeight:1.5 }}>{(DOMAIN_SVC[d.id] || {}).svc} addresses this gap directly.</div>
                </div>
                <div style={{ fontFamily:F, fontSize:9, fontWeight:700, color:t.color, background:t.bg, border:`1px solid ${t.border}`, padding:"3px 10px", whiteSpace:"nowrap", letterSpacing:"0.08em", textTransform:"uppercase" }}>{t.label}</div>
              </div>
            );
          })}
        </div>
      </div>
    );
  };

  /* ── DOMAIN SCORES TAB ── */
  const renderDomainsTab = () => (
    <div>
      {renderScoreLegend(showLegend, setShowLegend)}
      {DOMAIN_CATS.map(cat => (
        <div key={cat.id} style={{ marginBottom:28 }}>
          <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:10 }}>
            <div style={{ fontFamily:F, fontSize:10, fontWeight:700, color:cat.accent, letterSpacing:"0.14em", textTransform:"uppercase" }}>{cat.label}</div>
            <div style={{ fontFamily:F, fontSize:12, color:sc(catScore(cat)), fontWeight:600 }}>{catScore(cat)} avg</div>
          </div>
          {cat.domains.map(d => {
            const dom      = districtData?.domains?.[d.id] || { score:0, intent:0, operationalization:0, evidenceOfUse:0, evidence:"Not evaluated", gap:"", nextAction:"" };
            const isActive = activeDomain === d.id;
            const t        = tierOf(d.id);
            return (
              <div key={d.id} style={{ background:"#0a1628", border:`1px solid ${isActive ? cat.accent : "#1e2d4a"}`, overflow:"hidden", marginBottom:8 }}>
                <div onClick={() => setActiveDomain(isActive ? null : d.id)} style={{ display:"flex", alignItems:"center", gap:14, padding:"14px 18px", cursor:"pointer" }}>
                  <div style={{ width:32, height:32, background:sc(dom.score)+"22", border:`1px solid ${sc(dom.score)}44`, display:"flex", alignItems:"center", justifyContent:"center", flexShrink:0 }}>
                    <span style={{ fontFamily:Fs, fontSize:16, fontWeight:600, color:sc(dom.score) }}>{dom.score}</span>
                  </div>
                  <div style={{ flex:1 }}>
                    <div style={{ fontFamily:F, fontSize:13, fontWeight:600, color:"#e0e7ff" }}>{d.label}</div>
                    <div style={{ fontFamily:F, fontSize:11, color:sc(dom.score), marginTop:2 }}>{sl(dom.score)}</div>
                  </div>
                  <div style={{ display:"flex", gap:8, alignItems:"flex-end" }}>
                    {[["I", dom.intent, "Intent"], ["O", dom.operationalization, "Operationalization"], ["E", dom.evidenceOfUse, "Evidence of Use"]].map(([lbl, val, tip]) => (
                      <div key={lbl} title={tip} style={{ display:"flex", flexDirection:"column", alignItems:"center", gap:3 }}>
                        <div style={{ width:20, height:32, background:"#0d1a2d", position:"relative" }}>
                          <div style={{ position:"absolute", bottom:0, width:"100%", height:`${((val || 0) / 4) * 100}%`, background:sc(val || 0) }} />
                        </div>
                        <span style={{ fontFamily:F, fontSize:8, color:"#334155" }}>{lbl}</span>
                      </div>
                    ))}
                  </div>
                  <div style={{ width:90, height:4, background:"#1e2d4a", flexShrink:0 }}>
                    <div style={{ width:`${(dom.score / 4) * 100}%`, height:"100%", background:sc(dom.score) }} />
                  </div>
                  <div style={{ color:"#334155", fontSize:11 }}>{isActive ? "▲" : "▼"}</div>
                </div>
                {isActive && (
                  <div style={{ borderTop:`1px solid ${cat.accent}22`, padding:"16px 18px" }}>
                    <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr 1fr", gap:10, marginBottom:14 }}>
                      {[["Intent (I)", dom.intent, "Policy or strategic commitment exists"], ["Operationalization (O)", dom.operationalization, "Defined processes and ownership"], ["Evidence of Use (E)", dom.evidenceOfUse, "Documented proof of active implementation"]].map(([lbl, val, desc]) => (
                        <div key={lbl} style={{ background:"#080d1a", border:`1px solid ${sc(val || 0)}33`, padding:"10px 12px" }}>
                          <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:4 }}>
                            <div style={{ fontFamily:F, fontSize:9, fontWeight:700, color:sc(val || 0), letterSpacing:"0.08em", textTransform:"uppercase" }}>{lbl}</div>
                            <span style={{ fontFamily:Fs, fontSize:14, fontWeight:600, color:sc(val || 0) }}>{val || 0}</span>
                          </div>
                          <div style={{ fontFamily:F, fontSize:10, color:"#475569", lineHeight:1.4 }}>{desc}</div>
                        </div>
                      ))}
                    </div>
                    {/* Impact statement */}
                    {dom.impact && (
                      <div style={{ background:"#080d1a", border:"1px solid #1e2d4a", padding:"8px 12px", marginBottom:14 }}>
                        <div style={{ fontFamily:F, fontSize:9, fontWeight:700, color:"#f59e0b", letterSpacing:"0.14em", textTransform:"uppercase", marginBottom:4 }}>Impact</div>
                        <div style={{ fontFamily:F, fontSize:12, color:"#e0e7ff", lineHeight:1.5 }}>{dom.impact}</div>
                      </div>
                    )}
                    <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr 1fr", gap:16 }}>
                      <div>
                        <div style={{ fontFamily:F, fontSize:9, fontWeight:700, color:"#4b6a9e", letterSpacing:"0.14em", textTransform:"uppercase", marginBottom:6 }}>Evidence Found</div>
                        <div style={{ fontFamily:F, fontSize:12, color:"#94a3b8", lineHeight:1.6 }}>{dom.evidence}</div>
                        {dom.score === 0 && <div style={{ marginTop:8, fontFamily:F, fontSize:11, color:"#475569", lineHeight:1.6, borderLeft:"2px solid #334155", paddingLeft:8, fontStyle:"italic" }}>A score of 0 reflects the absence of public documentation -- not necessarily the absence of practice. If this work exists internally, the priority is to publish it.</div>}
                        {/* Source URLs */}
                        {dom.sourceUrls && dom.sourceUrls.filter(u => u).length > 0 && (
                          <div style={{ marginTop:10 }}>
                            <div style={{ fontFamily:F, fontSize:9, fontWeight:700, color:"#334155", letterSpacing:"0.10em", textTransform:"uppercase", marginBottom:4 }}>Sources</div>
                            {dom.sourceUrls.filter(u => u).map((u, i) => (
                              <div key={i} style={{ fontFamily:F, fontSize:10, color:"#3b82f6", lineHeight:1.6, wordBreak:"break-all" }}>
                                <a href={u} target="_blank" rel="noopener noreferrer" style={{ color:"#3b82f6", textDecoration:"none" }}>{u.length > 60 ? u.slice(0,57) + "..." : u}</a>
                              </div>
                            ))}
                          </div>
                        )}
                        {dom.sourceUrls && dom.sourceUrls.filter(u => u).length === 0 && dom.score === 0 && (
                          <div style={{ marginTop:8, fontFamily:F, fontSize:10, color:"#475569" }}>No public sources found after 7 targeted web searches.</div>
                        )}
                      </div>

  /* ── ROADMAP TAB ── */
  const renderRoadmapTab = () => {

    const phases = [
      { key:"immediate", label:"Immediate",  timeline:"0–90 Days",     color:"#dc2626", bg:"#0f0808", border:"#7f1d1d", icon:"⚡", desc:"Domains with no public documentation — the governance gaps most likely to create liability today.", items:items.filter(x => x.score <= 1) },

                  <div style={{ fontFamily:F, fontSize:9, fontWeight:700, color:"#3b82f6", letterSpacing:"0.14em", textTransform:"uppercase", marginBottom:8 }}>Tier 2 · Governance Sprint</div>
                  <div style={{ fontFamily:Fs, fontSize:16, color:"#94a3b8", fontWeight:600, marginBottom:8 }}>School Readiness Assessment</div>
                  <div style={{ fontFamily:F, fontSize:12, color:"#475569", lineHeight:1.7, marginBottom:16 }}>Building-level AI governance assessments conducted across your district's schools by Novo. Surfaces the gap between what the district publicly evidences and what is actually happening in each building.</div>
                  <div style={{ fontFamily:F, fontSize:11, color:"#334155", borderLeft:"2px solid #1e3a5f", paddingLeft:10, fontStyle:"italic", marginBottom:14 }}>Novo conducts these assessments as part of the Governance Sprint, working directly with principals to establish building-level baselines.</div>

                </div>

              {tl < 3 && (

                  <div style={{ fontFamily:F, fontSize:9, fontWeight:700, color:"#10b981", letterSpacing:"0.14em", textTransform:"uppercase", marginBottom:8 }}>Tier 3 · Full District Engagement</div>
                  <div style={{ fontFamily:Fs, fontSize:16, color:"#94a3b8", fontWeight:600, marginBottom:8 }}>Teacher AI Inventory</div>
                  <div style={{ fontFamily:F, fontSize:12, color:"#475569", lineHeight:1.7, marginBottom:16 }}>Classroom-level AI practice data collected at scale. Teachers report tools in use, student AI interactions, and professional development needs — giving district leadership visibility into the classroom reality that governance decisions must actually address.</div>

                  <a href="https://novoinnovativepathways.com" target="_blank" rel="noopener noreferrer" style={{ fontFamily:F, fontSize:11, color:"#10b981", textDecoration:"none" }}>Learn about Full District Engagement →</a>

              )}

          </div>

      </div>

  };

  const renderSchoolAudit = () => {
    const allQ     = SCHOOL_SECTIONS.flatMap(s => s.questions);
    const answered = allQ.filter(q => schoolAnswers[q.id] !== undefined).length;
    const total    = allQ.length;
    return (
      <div style={{ maxWidth:720, margin:"0 auto", padding:"40px" }}>
        <button onClick={() => go("results")} style={{ background:"none", border:"none", color:"#4b6a9e", fontFamily:F, fontSize:12, cursor:"pointer", padding:0, marginBottom:16, display:"block" }}>← Back to District Results</button>
        <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:24 }}>
          <div>
            <div style={{ fontFamily:Fs, fontSize:22, color:"#e0e7ff", fontWeight:600 }}>{schoolName}</div>
            <div style={{ fontFamily:F, fontSize:12, color:"#4b6a9e", marginTop:3 }}>Building-Level Readiness · {principalName}</div>
          </div>
          <div style={{ textAlign:"right" }}>

            {answered < total ? `${total - answered} Remaining` : "Generate School Report"}
          </button>
        </div>
      </div>
    );
  };

  const renderSchoolResults = () => {
    if (!schoolResults) return null;
    const dO  = districtData ? overallScore() : null;
    const gap = dO !== null ? Math.round((dO - schoolResults.avg) * 10) / 10 : null;
    return (
      <div style={{ maxWidth:800, margin:"0 auto", padding:"40px" }}>

          </div>
          <div style={{ background:"#0a1628", border:`1px solid ${schoolResults.riskScore > 2 ? "#7f1d1d" : "#1e2d4a"}`, padding:"20px", textAlign:"center" }}>

              </div>

            <div style={{ fontFamily:F, fontSize:12, color:Math.abs(gap) > 1 ? "#fca5a5" : "#94a3b8", lineHeight:1.7 }}>

        {SCHOOL_SECTIONS.map(section => (
          <div key={section.id} style={{ marginBottom:24 }}>

              const score   = schoolResults.answers[q.id] ?? 0;
              const label   = q.opts[score] || "—";
              const guide   = SCHOOL_GUIDANCE[q.id];
              const isHigh  = score >= 3;
              return (
                <div key={q.id} style={{ background:"#0a1628", border:"1px solid #1e2d4a", padding:"14px 18px", marginBottom:8 }}>

          <div style={{ width:3, height:24, background:"linear-gradient(180deg,#d97706,#78350f)" }} />
          <div>
            <div style={{ fontFamily:Fs, fontSize:15, fontWeight:600, color:"#e0e7ff", letterSpacing:"-0.01em" }}>Novo Innovative Pathways</div>

        </button>
        <div style={{ display:"flex", gap:10, alignItems:"center" }}>
          {engagementCode && step !== "landing" && step !== "gate" && (

          {tl >= 2 && step === "results" && (

          <div>
            <div style={{ display:"flex", alignItems:"center", gap:8, marginBottom:12 }}>
              <div style={{ width:3, height:20, background:"linear-gradient(180deg,#d97706,#78350f)" }} />

                <div style={{ fontFamily:Fs, fontSize:14, fontWeight:600, color:"#e0e7ff" }}>Novo</div>
                <div style={{ fontFamily:F, fontSize:9, color:"#334155", letterSpacing:"0.08em" }}>Innovative Pathways</div>
              </div>
            </div>
            <div style={{ fontFamily:F, fontSize:11, color:"#475569", lineHeight:1.7, maxWidth:280 }}>
              K-12 AI strategy and governance consulting. Based in Georgia. Serving districts nationwide.
            </div>
          </div>
          <div>
            <div style={{ fontFamily:F, fontSize:10, fontWeight:700, color:"#4b6a9e", letterSpacing:"0.12em", textTransform:"uppercase", marginBottom:12 }}>Services</div>
            {["Governance & Risk Readiness","Instructional & Academic Readiness","Strategic & Future Readiness"].map((s, i) => (
